services:
  seo-app:
    build: .
    container_name: seo-solutions
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - seo-data:/app/db
    environment:
      - PORT=3000
      - FLASK_ENV=production
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}

volumes:
  seo-data:
